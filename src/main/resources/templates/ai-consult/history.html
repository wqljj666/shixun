<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>咨询记录 - 康宁在线药房</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg pharmacy-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-capsule-pill"></i></span>
            <span>康宁在线药房</span>
        </a>
        <div class="ms-auto">
            <a class="btn btn-secondary-pharmacy" th:href="@{/ai-consult}">返回咨询</a>
        </div>
    </div>
</nav>

<main class="consult-page">
    <section class="container py-5">
        <div class="page-title-row">
            <div>
                <span class="soft-label"><i class="bi bi-clock-history"></i> 咨询记录</span>
                <h1>历史智能药师会话</h1>
            </div>
            <a class="btn btn-primary-pharmacy" th:href="@{/ai-consult}">
                <i class="bi bi-plus-circle"></i> 发起咨询
            </a>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(records)}">
            <i class="bi bi-chat-square-heart"></i>
            <h1>暂无咨询记录</h1>
            <p>提交智能药师咨询后，系统会按会话保存完整多轮聊天记录。</p>
            <a class="btn btn-primary-pharmacy" th:href="@{/ai-consult}">立即咨询</a>
        </div>

        <div class="consult-history-list" th:if="${!#lists.isEmpty(records)}">
            <a class="consult-record-card" th:each="record : ${records}"
               th:href="@{/ai-consult(conversationId=${record.conversationId})}">
                <div class="consult-record-head">
                    <span th:class="|risk-badge risk-${record.riskLevel}|" th:text="${record.riskLevelText}">低风险</span>
                    <time th:text="${#temporals.format(record.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</time>
                </div>
                <h2 th:text="${record.title}">咨询标题</h2>
                <p th:text="${record.lastMessage}">最后一条消息</p>
            </a>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
