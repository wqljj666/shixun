<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>购物车 - 康宁在线药房</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg pharmacy-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-capsule-pill"></i></span>
            <span>康宁在线药房</span>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-secondary-pharmacy" th:href="@{/medicines}">继续购药</a>
            <a class="btn btn-secondary-pharmacy" th:href="@{/orders}">我的订单</a>
        </div>
    </div>
</nav>

<main class="commerce-page">
    <section class="container py-5">
        <div class="page-title-row">
            <div>
                <span class="soft-label"><i class="bi bi-cart-check"></i> 购物车</span>
                <h1>核对药品与数量</h1>
            </div>
        </div>

        <div th:if="${success}" class="notice success-notice" th:text="${success}">操作成功</div>
        <div th:if="${error}" class="notice error-notice" th:text="${error}">操作失败</div>

        <div class="empty-state" th:if="${#lists.isEmpty(cart.items)}">
            <i class="bi bi-cart-x"></i>
            <h1>购物车还是空的</h1>
            <p>去药品分类页挑选常用药品，加入后可在这里统一结算。</p>
            <a class="btn btn-primary-pharmacy" th:href="@{/medicines}">去选购药品</a>
        </div>

        <div class="row g-4" th:if="${!#lists.isEmpty(cart.items)}">
            <div class="col-lg-8">
                <div class="cart-card">
                    <div class="cart-line" th:each="item : ${cart.items}">
                        <img th:src="${item.medicine.imageUrl}" th:alt="${item.medicine.name}">
                        <div class="cart-info">
                            <h2 th:text="${item.medicine.name}">药品名称</h2>
                            <p th:text="${item.medicine.specification}">规格</p>
                            <span th:class="${item.medicine.stock <= 15 ? 'stock-warning' : 'stock-normal'}"
                                  th:text="|库存 ${item.medicine.stock}|">库存</span>
                        </div>
                        <div class="cart-price" th:text="|￥${#numbers.formatDecimal(item.medicine.price, 1, 'COMMA', 2, 'POINT')}|">￥0.00</div>
                        <form class="cart-quantity" th:action="@{/cart/{id}/update(id=${item.cartItem.id})}" method="post">
                            <input class="form-control" type="number" name="quantity" min="1"
                                   th:attr="max=${item.medicine.stock}" th:value="${item.cartItem.quantity}">
                            <button class="btn btn-outline-pharmacy" type="submit">更新</button>
                        </form>
                        <div class="cart-subtotal" th:text="|￥${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}|">￥0.00</div>
                        <form th:action="@{/cart/{id}/delete(id=${item.cartItem.id})}" method="post">
                            <button class="btn btn-cancel" type="submit"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <aside class="settlement-card">
                    <h2>结算汇总</h2>
                    <div class="settlement-row">
                        <span>商品数量</span>
                        <strong th:text="|${cart.totalQuantity} 件|">0 件</strong>
                    </div>
                    <div class="settlement-row">
                        <span>商品总额</span>
                        <strong th:text="|￥${#numbers.formatDecimal(cart.totalAmount, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                    </div>
                    <div class="settlement-total">
                        <span>应付金额</span>
                        <strong th:text="|￥${#numbers.formatDecimal(cart.totalAmount, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                    </div>
                    <a class="btn btn-pay w-100" th:href="@{/orders/confirm}">
                        <i class="bi bi-credit-card"></i> 去结算
                    </a>
                </aside>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
