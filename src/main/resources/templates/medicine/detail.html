<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|${medicine.name} - 康宁在线药房|">药品详情 - 康宁在线药房</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg pharmacy-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-capsule-pill"></i></span>
            <span>康宁在线药房</span>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-secondary-pharmacy" th:href="@{/cart}"><i class="bi bi-cart"></i> 购物车</a>
            <a class="btn btn-secondary-pharmacy" th:href="@{/medicines}"><i class="bi bi-arrow-left"></i> 返回列表</a>
        </div>
    </div>
</nav>

<main class="detail-page">
    <section class="container py-5">
        <div th:if="${success}" class="notice success-notice" th:text="${success}">操作成功</div>
        <div th:if="${error}" class="notice error-notice" th:text="${error}">操作失败</div>

        <div class="detail-shell">
            <div class="row g-4 g-lg-5">
                <div class="col-lg-5">
                    <div class="detail-image">
                        <img th:src="${medicine.imageUrl}" th:alt="${medicine.name}">
                        <span class="category-mini" th:text="${medicine.categoryName}">药品分类</span>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="detail-info">
                        <div class="product-tags">
                            <span class="otc-badge" th:if="${medicine.otcFlag}">OTC</span>
                            <span class="rx-badge" th:if="${medicine.prescriptionRequired}">处方药</span>
                            <span class="tag" th:text="${medicine.categoryName}">分类</span>
                        </div>
                        <h1 th:text="${medicine.name}">药品名称</h1>
                        <div class="detail-price" th:text="|￥${#numbers.formatDecimal(medicine.price, 1, 'COMMA', 2, 'POINT')}|">￥0.00</div>
                        <div class="rx-alert" th:if="${medicine.prescriptionRequired}">
                            <i class="bi bi-exclamation-triangle"></i>
                            处方药需药师审核后购买
                        </div>
                        <dl class="detail-specs">
                            <div>
                                <dt>规格</dt>
                                <dd th:text="${medicine.specification}">规格</dd>
                            </div>
                            <div>
                                <dt>库存</dt>
                                <dd th:class="${medicine.stock <= 15 ? 'stock-warning' : 'stock-normal'}"
                                    th:text="|${medicine.stock} 件|">库存</dd>
                            </div>
                            <div>
                                <dt>生产厂家</dt>
                                <dd th:text="${medicine.manufacturer}">厂家</dd>
                            </div>
                            <div>
                                <dt>药品类型</dt>
                                <dd th:text="${medicine.prescriptionRequired ? '处方药' : '非处方药'}">类型</dd>
                            </div>
                        </dl>
                        <form class="detail-actions" th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="medicineId" th:value="${medicine.id}">
                            <div class="quantity-box">
                                <label for="quantity">数量</label>
                                <input id="quantity" class="form-control" type="number" name="quantity" min="1"
                                       th:attr="max=${medicine.stock}" value="1">
                            </div>
                            <button class="btn btn-primary-pharmacy" type="submit"
                                    th:disabled="${medicine.prescriptionRequired || medicine.stock <= 0}">
                                <i class="bi bi-cart-plus"></i> 加入购物车
                            </button>
                            <a class="btn btn-secondary-pharmacy" th:href="@{/ai-consult}"><i class="bi bi-headset"></i> 咨询药师</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="detail-tabs">
            <section>
                <h2><i class="bi bi-file-medical"></i> 药品说明</h2>
                <p th:text="${medicine.description}">药品说明</p>
            </section>
            <section>
                <h2><i class="bi bi-slash-circle"></i> 禁忌</h2>
                <p th:text="${medicine.contraindication}">禁忌</p>
            </section>
            <section>
                <h2><i class="bi bi-info-circle"></i> 注意事项</h2>
                <p th:text="${medicine.notice}">注意事项</p>
            </section>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
