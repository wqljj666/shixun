<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>药品分类 - 康宁在线药房</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg pharmacy-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-capsule-pill"></i></span>
            <span>康宁在线药房</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="切换导航">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">首页</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/medicines}">药品分类</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/ai-consult}">智能药师</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cart}">购物车</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">我的订单</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="catalog-page">
    <section class="catalog-hero">
        <div class="container">
            <span class="soft-label"><i class="bi bi-search-heart"></i> 药品信息中心</span>
            <h1>按症状、分类或名称查找药品</h1>
            <p>展示药品规格、价格、库存、OTC 与处方药标识，帮助用户在下单前快速了解用药信息。</p>
        </div>
    </section>

    <section class="container pb-5">
        <form class="search-panel" th:action="@{/medicines}" method="get">
            <div class="search-input-wrap">
                <i class="bi bi-search"></i>
                <input type="text" name="keyword" class="form-control" placeholder="搜索药品名称、厂家或功效关键词"
                       th:value="${searchRequest.keyword}">
            </div>
            <input type="hidden" name="categoryId" th:value="${searchRequest.categoryId}">
            <button class="btn btn-primary-pharmacy" type="submit">搜索药品</button>
        </form>

        <div class="category-filter">
            <a th:href="@{/medicines(keyword=${searchRequest.keyword})}"
               th:classappend="${searchRequest.categoryId == null} ? ' active' : ''">全部药品</a>
            <a th:each="category : ${categories}"
               th:href="@{/medicines(keyword=${searchRequest.keyword}, categoryId=${category.id})}"
               th:text="${category.name}"
               th:classappend="${searchRequest.categoryId == category.id} ? ' active' : ''">分类</a>
        </div>

        <div class="result-summary">
            <div>
                <strong th:text="${#lists.size(medicines)}">0</strong>
                <span>个药品匹配当前条件</span>
            </div>
            <a class="reset-link" th:href="@{/medicines}" th:if="${searchRequest.keyword != null || searchRequest.categoryId != null}">
                <i class="bi bi-arrow-counterclockwise"></i> 重置筛选
            </a>
        </div>

        <div class="row g-4" th:if="${!#lists.isEmpty(medicines)}">
            <div class="col-sm-6 col-xl-3" th:each="medicine : ${medicines}">
                <article class="product-card">
                    <a class="product-image" th:href="@{/medicines/{id}(id=${medicine.id})}">
                        <img th:src="${medicine.imageUrl}" th:alt="${medicine.name}">
                        <span class="category-mini" th:text="${medicine.categoryName}">感冒用药</span>
                    </a>
                    <div class="product-body">
                        <div class="product-tags">
                            <span class="otc-badge" th:if="${medicine.otcFlag}">OTC</span>
                            <span class="rx-badge" th:if="${medicine.prescriptionRequired}">处方药</span>
                        </div>
                        <h2><a th:href="@{/medicines/{id}(id=${medicine.id})}" th:text="${medicine.name}">药品名称</a></h2>
                        <p class="spec" th:text="${medicine.specification}">规格</p>
                        <div class="product-meta">
                            <span class="price" th:text="|￥${medicine.price}|">￥0.00</span>
                            <span th:class="${medicine.stock <= 15 ? 'stock-warning' : 'stock-normal'}"
                                  th:text="|库存 ${medicine.stock}|">库存</span>
                        </div>
                        <a class="btn btn-outline-pharmacy w-100" th:href="@{/medicines/{id}(id=${medicine.id})}">
                            查看详情
                        </a>
                    </div>
                </article>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(medicines)}">
            <i class="bi bi-search"></i>
            <h1>暂无匹配药品</h1>
            <p>请尝试更换关键词或选择其他药品分类。</p>
            <a class="btn btn-primary-pharmacy" th:href="@{/medicines}">查看全部药品</a>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
