<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>确认订单 - 康宁在线药房</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg pharmacy-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-capsule-pill"></i></span>
            <span>康宁在线药房</span>
        </a>
        <div class="ms-auto">
            <a class="btn btn-secondary-pharmacy" th:href="@{/cart}">返回购物车</a>
        </div>
    </div>
</nav>

<main class="commerce-page">
    <section class="container py-5">
        <div class="page-title-row">
            <div>
                <span class="soft-label"><i class="bi bi-receipt"></i> 确认订单</span>
                <h1>确认配送与支付金额</h1>
            </div>
        </div>

        <div th:if="${error}" class="notice error-notice" th:text="${error}">操作失败</div>

        <form th:action="@{/orders}" method="post">
            <div class="row g-4">
                <div class="col-lg-8">
                    <section class="checkout-card">
                        <h2><i class="bi bi-geo-alt"></i> 收货地址</h2>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">收货人</label>
                                <input class="form-control" name="receiverName" th:value="${createOrderRequest.receiverName}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">联系电话</label>
                                <input class="form-control" name="receiverPhone" th:value="${createOrderRequest.receiverPhone}" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">详细地址</label>
                                <input class="form-control" name="receiverAddress" th:value="${createOrderRequest.receiverAddress}" required>
                            </div>
                        </div>
                    </section>

                    <section class="checkout-card">
                        <h2><i class="bi bi-truck"></i> 配送方式</h2>
                        <div class="delivery-option">
                            <input type="radio" id="standardDelivery" name="deliveryMethod" value="标准配送" checked>
                            <label for="standardDelivery">
                                <strong>标准配送</strong>
                                <span>预计 1-3 天送达，配送费本阶段演示为 0 元</span>
                            </label>
                        </div>
                    </section>

                    <section class="checkout-card">
                        <h2><i class="bi bi-bag-check"></i> 药品明细</h2>
                        <div class="checkout-line" th:each="item : ${cart.items}">
                            <img th:src="${item.medicine.imageUrl}" th:alt="${item.medicine.name}">
                            <div>
                                <h3 th:text="${item.medicine.name}">药品名称</h3>
                                <p th:text="${item.medicine.specification}">规格</p>
                            </div>
                            <span th:text="|x ${item.cartItem.quantity}|">x 1</span>
                            <strong th:text="|￥${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                        </div>
                    </section>
                </div>
                <div class="col-lg-4">
                    <aside class="settlement-card sticky-summary">
                        <h2>订单金额</h2>
                        <div class="settlement-row">
                            <span>商品总额</span>
                            <strong th:text="|￥${#numbers.formatDecimal(cart.totalAmount, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                        </div>
                        <div class="settlement-row">
                            <span>配送费</span>
                            <strong>￥0.00</strong>
                        </div>
                        <div class="settlement-total">
                            <span>应付金额</span>
                            <strong th:text="|￥${#numbers.formatDecimal(cart.totalAmount, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                        </div>
                        <button class="btn btn-pay w-100" type="submit">
                            <i class="bi bi-check2-circle"></i> 提交订单
                        </button>
                    </aside>
                </div>
            </div>
        </form>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
