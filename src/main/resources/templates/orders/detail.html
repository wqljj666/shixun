<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|订单 ${detail.order.orderNo} - 康宁在线药房|">订单详情 - 康宁在线药房</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg pharmacy-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-capsule-pill"></i></span>
            <span>康宁在线药房</span>
        </a>
        <div class="ms-auto">
            <a class="btn btn-secondary-pharmacy" th:href="@{/orders}">返回订单列表</a>
        </div>
    </div>
</nav>

<main class="commerce-page">
    <section class="container py-5">
        <div th:if="${success}" class="notice success-notice" th:text="${success}">操作成功</div>
        <div th:if="${error}" class="notice error-notice" th:text="${error}">操作失败</div>

        <div class="order-detail-hero">
            <div>
                <span class="soft-label"><i class="bi bi-clipboard2-pulse"></i> 订单详情</span>
                <h1 th:text="${detail.order.orderNo}">订单编号</h1>
                <p th:text="|下单时间 ${#temporals.format(detail.order.createdAt, 'yyyy-MM-dd HH:mm')}|">下单时间</p>
            </div>
            <div class="order-detail-actions">
                <span th:class="|status-badge status-${detail.order.status}|" th:text="${detail.statusText}">待支付</span>
                <form th:if="${detail.order.status == 'WAIT_PAY'}" th:action="@{/payments/orders/{id}/pay(id=${detail.order.id})}" method="post">
                    <button class="btn btn-pay" type="submit"><i class="bi bi-credit-card"></i> 模拟支付</button>
                </form>
                <form th:if="${detail.order.status == 'WAIT_PAY'}" th:action="@{/orders/{id}/cancel(id=${detail.order.id})}" method="post">
                    <button class="btn btn-cancel" type="submit"><i class="bi bi-x-circle"></i> 取消订单</button>
                </form>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <section class="checkout-card">
                    <h2><i class="bi bi-bag-check"></i> 药品明细</h2>
                    <div class="checkout-line" th:each="item : ${detail.items}">
                        <img th:src="${item.imageUrl}" th:alt="${item.medicineName}">
                        <div>
                            <h3 th:text="${item.medicineName}">药品名称</h3>
                            <p th:text="|${item.specification} · ${item.manufacturer}|">规格</p>
                        </div>
                        <span th:text="|x ${item.quantity}|">x 1</span>
                        <strong th:text="|￥${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                    </div>
                </section>

                <section class="checkout-card">
                    <h2><i class="bi bi-geo-alt"></i> 配送信息</h2>
                    <div class="info-grid">
                        <div>
                            <span>收货人</span>
                            <strong th:text="${detail.order.receiverName}">收货人</strong>
                        </div>
                        <div>
                            <span>联系电话</span>
                            <strong th:text="${detail.order.receiverPhone}">电话</strong>
                        </div>
                        <div>
                            <span>配送方式</span>
                            <strong th:text="${detail.order.deliveryMethod}">标准配送</strong>
                        </div>
                        <div>
                            <span>收货地址</span>
                            <strong th:text="${detail.order.receiverAddress}">地址</strong>
                        </div>
                    </div>
                </section>

                <section class="checkout-card">
                    <h2><i class="bi bi-wallet2"></i> 支付信息</h2>
                    <div class="payment-empty" th:if="${#lists.isEmpty(detail.payments)}">
                        暂无支付记录，待支付订单可点击“模拟支付”完成支付。
                    </div>
                    <div class="payment-record" th:each="payment : ${detail.payments}">
                        <div>
                            <span>支付流水</span>
                            <strong th:text="${payment.paymentNo}">PAY202601010001</strong>
                        </div>
                        <div>
                            <span>支付方式</span>
                            <strong th:text="${payment.paymentMethod}">模拟支付</strong>
                        </div>
                        <div>
                            <span>支付时间</span>
                            <strong th:text="${#temporals.format(payment.paidAt, 'yyyy-MM-dd HH:mm')}">时间</strong>
                        </div>
                        <div>
                            <span>支付金额</span>
                            <strong class="price" th:text="|￥${#numbers.formatDecimal(payment.amount, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                        </div>
                    </div>
                </section>
            </div>
            <div class="col-lg-4">
                <aside class="settlement-card sticky-summary">
                    <h2>订单金额</h2>
                    <div class="settlement-row">
                        <span>商品总额</span>
                        <strong th:text="|￥${#numbers.formatDecimal(detail.order.totalAmount, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                    </div>
                    <div class="settlement-row">
                        <span>配送费</span>
                        <strong th:text="|￥${#numbers.formatDecimal(detail.order.deliveryFee, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                    </div>
                    <div class="settlement-total">
                        <span>实付金额</span>
                        <strong th:text="|￥${#numbers.formatDecimal(detail.order.payAmount, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                    </div>
                </aside>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
