<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的订单 - 康宁在线药房</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg pharmacy-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-mark"><i class="bi bi-capsule-pill"></i></span>
            <span>康宁在线药房</span>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-secondary-pharmacy" th:href="@{/medicines}">继续购药</a>
            <a class="btn btn-secondary-pharmacy" th:href="@{/cart}">购物车</a>
        </div>
    </div>
</nav>

<main class="commerce-page">
    <section class="container py-5">
        <div class="page-title-row">
            <div>
                <span class="soft-label"><i class="bi bi-receipt"></i> 我的订单</span>
                <h1>查看订单、支付与取消</h1>
            </div>
        </div>

        <div th:if="${success}" class="notice success-notice" th:text="${success}">操作成功</div>
        <div th:if="${error}" class="notice error-notice" th:text="${error}">操作失败</div>

        <div class="empty-state" th:if="${#lists.isEmpty(orders)}">
            <i class="bi bi-receipt-cutoff"></i>
            <h1>暂无订单</h1>
            <p>提交订单后，可以在这里查看支付状态和订单详情。</p>
            <a class="btn btn-primary-pharmacy" th:href="@{/medicines}">去选购药品</a>
        </div>

        <div class="order-list" th:if="${!#lists.isEmpty(orders)}">
            <article class="order-card" th:each="order : ${orders}">
                <div class="order-card-head">
                    <div>
                        <span>订单编号</span>
                        <strong th:text="${order.orderNo}">KN202601010001</strong>
                    </div>
                    <span th:class="|status-badge status-${order.status}|"
                          th:text="${order.status == 'WAIT_PAY' ? '待支付' : (order.status == 'PAID' ? '已支付' : (order.status == 'CANCELED' ? '已取消' : '已完成'))}">待支付</span>
                </div>
                <div class="order-card-body">
                    <div>
                        <span>下单时间</span>
                        <strong th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 10:00</strong>
                    </div>
                    <div>
                        <span>订单金额</span>
                        <strong class="price" th:text="|￥${#numbers.formatDecimal(order.payAmount, 1, 'COMMA', 2, 'POINT')}|">￥0.00</strong>
                    </div>
                    <div class="order-actions">
                        <a class="btn btn-outline-pharmacy" th:href="@{/orders/{id}(id=${order.id})}">查看详情</a>
                        <form th:if="${order.status == 'WAIT_PAY'}" th:action="@{/payments/orders/{id}/pay(id=${order.id})}" method="post">
                            <button class="btn btn-pay" type="submit">模拟支付</button>
                        </form>
                        <form th:if="${order.status == 'WAIT_PAY'}" th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post">
                            <button class="btn btn-cancel" type="submit">取消订单</button>
                        </form>
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
