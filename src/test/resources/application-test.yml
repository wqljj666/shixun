spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:pharmacy_test_db;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never

llm:
  api-url: http://localhost/not-used-in-tests
  api-key:
  model: test-model
